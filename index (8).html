<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Schedule Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f0f1f5;
      --white: #ffffff;
      --dark: #1a1a2e;
      --mid: #888;
      --accent: #4f46e5;
      --shadow: rgba(0,0,0,0.10);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 16px;
      color: var(--dark);
    }

    .page-header { margin-bottom: 18px; }
    .page-header h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .page-header p {
      font-size: 0.78rem;
      color: var(--mid);
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .panel {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .panel-title {
      font-family: 'Nunito', sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 400px) {
      .info-grid { grid-template-columns: 1fr; }
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--mid);
    }
    .opt {
      font-weight: 600;
      color: #ccc;
      margin-left: 3px;
      font-size: 0.62rem;
    }

    input[type="text"], select {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--dark);
      background: #f9fafb;
      outline: none;
      width: 100%;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      background: var(--white);
    }

    /* Custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mid);
      font-size: 0.8rem;
      pointer-events: none;
    }
    .select-wrap select { padding-right: 30px; }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      letter-spacing: 0.3px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      text-align: center;
    }
    .btn:active { transform: scale(0.97); }
    .btn-add  { background: var(--dark); color: #fff; }
    .btn-add:hover { opacity: 0.85; }
    .btn-clear { background: #f3f4f6; color: var(--mid); }
    .btn-clear:hover { background: #e5e7eb; }
    .btn-download { background: var(--dark); color: #fff; }
    .btn-download:hover { opacity: 0.85; }

    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
    }
    .entry-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 8px 10px 8px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      border-left: 4px solid #999;
    }
    .entry-tag .tag-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
    .entry-tag .tag-name { font-size: 0.84rem; font-weight: 800; }
    .entry-tag .tag-meta { font-size: 0.72rem; font-weight: 500; opacity: 0.65; }
    .entry-tag .remove-btn {
      cursor: pointer;
      font-size: 1rem;
      color: #ccc;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .entry-tag .remove-btn:hover { color: #ef4444; }

    .preview-wrap {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .preview-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 8px;
    }
    .preview-label {
      font-family: 'Nunito', sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--mid);
    }
    .preview-meta {
      font-size: 0.72rem;
      color: #aaa;
      font-weight: 600;
    }
    .preview-btns { display: flex; gap: 8px; align-items: center; }
    .preview-btns .btn { width: auto; font-size: 0.78rem; padding: 7px 14px; }

    /* ── Poster canvas: fixed 800×640, scaled uniformly ── */
    .poster-scaler {
      width: 100%;
      overflow: hidden;
      border-radius: 14px;
    }
    #posterCard {
      width: 1123px;
      height: 794px;
      transform-origin: top left;
      background: #ffffff;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: 'Nunito', sans-serif;
    }

    /* Coloured header band */
    .poster-header {
      background: #1a1a2e;
      padding: 24px 36px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .poster-header-left { display: flex; flex-direction: column; gap: 4px; }
    .poster-title {
      font-weight: 900;
      font-size: 2rem;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .poster-subtitle {
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .poster-header-right {
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .poster-info-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    .poster-info-chip .chip-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .poster-info-chip .chip-val {
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
    }
    .poster-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.15);
    }

    /* Stats row */
    .poster-stats {
      background: #f7f8fc;
      border-bottom: 1px solid #e8eaf0;
      display: flex;
      flex-shrink: 0;
    }
    .pstat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 0;
      border-right: 1px solid #e8eaf0;
    }
    .pstat:last-child { border-right: none; }
    .pstat-val {
      font-weight: 900;
      font-size: 1.25rem;
      color: #1a1a2e;
    }
    .pstat-lbl {
      font-size: 0.65rem;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Table */
    .poster-table-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .poster-table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .poster-table th, .poster-table td {
      border: 1px solid #eaecf2;
      text-align: center;
      vertical-align: middle;
      padding: 0;
    }
    .poster-table thead th {
      background: #f7f8fc;
      font-weight: 800;
      font-size: 0.78rem;
      color: #888;
      padding: 10px 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 2px solid #e0e3ee;
    }
    .poster-table thead th:first-child {
      width: 80px;
      color: #bbb;
    }
    .poster-table tbody tr {
      height: calc(100% / 7);
    }
    .poster-table tbody td {
      font-size: 0.9rem;
    }
    .poster-table tbody td.time-cell {
      font-weight: 800;
      font-size: 0.78rem;
      color: #aaa;
      background: #f7f8fc;
      letter-spacing: 0.3px;
    }
    .poster-table tbody tr:hover td { background-color: #fafbff; }
    .poster-table tbody tr:hover td.time-cell { background-color: #f7f8fc; }

    .pcourse-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 6px 4px;
      border-top: 4px solid;
      gap: 3px;
      animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .pcourse-name {
      font-weight: 900;
      font-size: 0.88rem;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 92%;
    }
    .pcourse-room {
      font-size: 0.7rem;
      font-weight: 700;
      opacity: 0.6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 92%;
    }

    @media (min-width: 640px) {
      body { padding: 24px; max-width: 820px; margin: 0 auto; }
      .form-grid { grid-template-columns: 1fr 1fr 1fr; }
      .btn-add-wrap { grid-column: auto; }
    }
    /* Poster internals are always fixed-size – no responsive overrides needed */
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Class Schedule Builder</h1>
    <p>Enter your courses, pick your days and time slots - your schedule draws itself.</p>
  </div>

  <div class="panel">
    <div class="panel-title">Student Info</div>
    <div class="info-grid">
      <div class="form-group">
        <label>Name <span class="opt">optional</span></label>
        <input class="info-input" id="studentName" type="text">
      </div>
      <div class="form-group">
        <label>Department <span class="opt">optional</span></label>
        <input class="info-input" id="studentDept" type="text">
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Add a Course</div>
    <div class="form-grid">

      <div class="form-group">
        <label>Course Name</label>
        <input type="text" id="courseName" placeholder="e.g. MAT101" maxlength="12">
      </div>

      <div class="form-group">
        <label>Room <span class="opt">optional</span></label>
        <input type="text" id="courseRoom" placeholder="BC1005" maxlength="10">
      </div>

      <div class="form-group">
        <label>Days</label>
        <div class="select-wrap">
          <select id="courseDays">
            <option value="MW">MW – Mon &amp; Wed</option>
            <option value="ST">ST – Sun &amp; Tue</option>
            <option value="AR">AR – Thu &amp; Sat</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Time Slot</label>
        <div class="select-wrap">
          <select id="courseSlot">
            <option value="0">08:00 – 09:30</option>
            <option value="1">09:40 – 11:10</option>
            <option value="2">11:20 – 12:50</option>
            <option value="3">13:00 – 14:30</option>
            <option value="4">14:40 – 16:10</option>
            <option value="5">16:20 – 17:50</option>
            <option value="6">18:00 – 19:30</option>
          </select>
        </div>
      </div>

      <div class="form-group full">
        <button class="btn btn-add" onclick="addCourse()">+ Add Course</button>
      </div>

    </div>
    <div class="entry-list" id="entryList"></div>
  </div>

    <div class="preview-wrap">
    <div class="preview-actions">
      <div>
        <div class="preview-label">Live Preview</div>
        <div class="preview-meta" id="previewMeta">No courses added yet</div>
      </div>
      <div class="preview-btns">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-download" id="dlBtn" onclick="downloadPNG()">⬇ Download</button>
      </div>
    </div>

    <div class="poster-scaler" id="posterScaler">
    <div id="posterCard">

      <!-- Header band -->
      <div class="poster-header">
        <div class="poster-header-left">
          <div class="poster-title">Class Schedule</div>
          <div class="poster-subtitle">Weekly Timetable</div>
        </div>
        <div class="poster-header-right">
          <div class="poster-info-chip">
            <span class="chip-label">Name</span>
            <span class="chip-val" id="pName">—</span>
          </div>
          <div class="poster-divider"></div>
          <div class="poster-info-chip">
            <span class="chip-label">Department</span>
            <span class="chip-val" id="pDept">—</span>
          </div>
        </div>
      </div>

      <!-- Stats strip -->
      <div class="poster-stats">
        <div class="pstat"><span class="pstat-val" id="pStatCourses">0</span><span class="pstat-lbl">Courses</span></div>
        <div class="pstat"><span class="pstat-val" id="pStatHours">0h</span><span class="pstat-lbl">/ week</span></div>
        <div class="pstat"><span class="pstat-val" id="pStatDays">0</span><span class="pstat-lbl">Active days</span></div>
      </div>

      <!-- Table -->
      <div class="poster-table-wrap">
        <table class="poster-table" id="posterTable">
          <thead id="pHead"></thead>
          <tbody id="pBody"></tbody>
        </table>
      </div>

    </div>
    </div><!-- /posterScaler -->
  </div>

  <script>
    const POSTER_W = 1123;
    const POSTER_H = 794;

    function scalePoster() {
      const scaler = document.getElementById('posterScaler');
      const card   = document.getElementById('posterCard');
      const available = scaler.clientWidth;
      const scale = available / POSTER_W;
      card.style.transform = `scale(${scale})`;
      scaler.style.height = (POSTER_H * scale) + 'px';
    }

    window.addEventListener('resize', scalePoster);

    const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Sat'];
    const SLOTS  = ['08:00–09:30','09:40–11:10','11:20–12:50','13:00–14:30','14:40–16:10','16:20–17:50','18:00–19:30'];
    const COLORS = [
      { bg:'#e8f5e9', border:'#43a047', text:'#2e7d32' },
      { bg:'#e3f2fd', border:'#1e88e5', text:'#1565c0' },
      { bg:'#fff3e0', border:'#fb8c00', text:'#e65100' },
      { bg:'#fce4ec', border:'#e91e63', text:'#880e4f' },
      { bg:'#f3e5f5', border:'#8e24aa', text:'#4a148c' },
      { bg:'#e0f2f1', border:'#00897b', text:'#004d40' },
      { bg:'#fffde7', border:'#f9a825', text:'#f57f17' },
      { bg:'#fbe9e7', border:'#f4511e', text:'#bf360c' },
    ];
    const DAY_MAP = { MW:[1,3], ST:[0,2], AR:[4,5] };

    let courses = [];

    function nextColor() {
      const used = new Set(courses.map(c => c.color));
      for (let i = 0; i < COLORS.length; i++) if (!used.has(i)) return i;
      const counts = Array(COLORS.length).fill(0);
      courses.forEach(c => counts[c.color]++);
      return counts.indexOf(Math.min(...counts));
    }

    function addCourse() {
      const name = document.getElementById('courseName').value.trim().toUpperCase();
      const room = document.getElementById('courseRoom').value.trim().toUpperCase();
      const days = document.getElementById('courseDays').value;
      const slot = parseInt(document.getElementById('courseSlot').value);
      if (!name) { alert('Please enter a course name.'); return; }

      const newDayCols = DAY_MAP[days] || [];
      const conflict = courses.find(c => {
        if (c.slot !== slot) return false;
        const existingCols = DAY_MAP[c.days] || [];
        return newDayCols.some(d => existingCols.includes(d));
      });
      if (conflict) {
        const conflictDays = newDayCols
          .filter(d => (DAY_MAP[conflict.days] || []).includes(d))
          .map(d => DAYS[d]).join(' & ');
        showConflictError(`Conflict: ${conflict.name} already occupies ${conflictDays} at ${SLOTS[slot].split('–')[0].trim()}`);
        return;
      }

      clearConflictError();
      courses.push({ name, room, days, slot, color: nextColor() });
      document.getElementById('courseName').value = '';
      document.getElementById('courseRoom').value = '';
      renderTags();
      renderPreview();
    }

    function showConflictError(msg) {
      let el = document.getElementById('conflictMsg');
      if (!el) {
        el = document.createElement('div');
        el.id = 'conflictMsg';
        el.style.cssText = `
          margin-top: 10px; padding: 9px 13px;
          background: #fef2f2; border: 1.5px solid #fca5a5;
          border-radius: 8px; color: #b91c1c;
          font-size: 0.8rem; font-weight: 700;
          display: flex; align-items: center; gap: 7px;
        `;
        document.getElementById('entryList').before(el);
      }
      el.innerHTML = `<span style="font-size:1rem">⚠️</span> ${msg}`;
      el.style.display = 'flex';
    }

    function clearConflictError() {
      const el = document.getElementById('conflictMsg');
      if (el) el.style.display = 'none';
    }

    function removeCourse(i) {
      courses.splice(i, 1);
      renderTags();
      renderPreview();
    }

    function clearAll() {
      courses = [];
      renderTags();
      renderPreview();
    }

    function renderTags() {
      const list = document.getElementById('entryList');
      list.innerHTML = '';
      courses.forEach((c, i) => {
        const col = COLORS[c.color];
        const tag = document.createElement('div');
        tag.className = 'entry-tag';
        tag.style.borderColor = col.border;
        tag.style.background  = col.bg;
        tag.style.color       = col.text;
        const roomPart = c.room ? ` · ${c.room}` : '';
        const slotLabel = SLOTS[c.slot].split('–')[0];
        tag.innerHTML = `
          <div class="tag-info">
            <span class="tag-name">${c.name}</span>
            <span class="tag-meta">${c.days}${roomPart} · ${slotLabel}</span>
          </div>
          <span class="remove-btn" onclick="removeCourse(${i})">✕</span>
        `;
        list.appendChild(tag);
      });
    }

    function renderPreview() {
      const sName = document.getElementById('studentName').value.trim();
      const sDept = document.getElementById('studentDept').value.trim();

      document.getElementById('pName').textContent = sName || '—';
      document.getElementById('pDept').textContent = sDept || '—';

      const uniqueDays = new Set();
      courses.forEach(c => (DAY_MAP[c.days] || []).forEach(d => uniqueDays.add(d)));
      const totalHours = courses.length * 3;
      document.getElementById('pStatCourses').textContent = courses.length;
      document.getElementById('pStatHours').textContent   = totalHours + 'h';
      document.getElementById('pStatDays').textContent    = uniqueDays.size;

      const meta = courses.length === 0
        ? 'No courses added yet'
        : `${courses.length} course${courses.length > 1 ? 's' : ''} added`;
      document.getElementById('previewMeta').textContent = meta;

      const grid = Array.from({length: SLOTS.length}, () => Array(DAYS.length).fill(null));
      courses.forEach(c => {
        (DAY_MAP[c.days] || []).forEach(di => { grid[c.slot][di] = c; });
      });

      const head = document.getElementById('pHead');
      let headHtml = '<tr><th>Time</th>';
      DAYS.forEach((d) => {
        headHtml += `<th>${d}</th>`;
      });
      headHtml += '</tr>';
      head.innerHTML = headHtml;

      const body = document.getElementById('pBody');
      let bodyHtml = '';
      SLOTS.forEach((slot, si) => {
        const t1 = slot.split('–')[0].trim();
        const label = t1.replace(':', '.');
        bodyHtml += `<tr><td class="time-cell">${label}</td>`;
        DAYS.forEach((_, di) => {
          const c = grid[si][di];
          if (c) {
            const col = COLORS[c.color];
            bodyHtml += `<td style="padding:0; background:${col.bg};">
              <div class="pcourse-card" style="border-top-color:${col.border}; color:${col.text};">
                <div class="pcourse-name">${c.name}</div>
                ${c.room ? `<div class="pcourse-room">${c.room}</div>` : ''}
              </div>
            </td>`;
          } else {
            bodyHtml += `<td></td>`;
          }
        });
        bodyHtml += '</tr>';
      });
      body.innerHTML = bodyHtml;
    }

    async function downloadPNG() {
      const btn = document.getElementById('dlBtn');
      btn.textContent = '…';
      btn.disabled = true;

      const target = document.getElementById('posterCard');

      const canvas = await html2canvas(target, {
        scale: 4,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false,
        width: 1123,
        height: 794,
        onclone: (doc) => {
          doc.querySelectorAll('*').forEach(el => {
            el.style.fontFamily = el.style.fontFamily || '';
          });
        }
      });

      const a = document.createElement('a');
      a.download = 'class_schedule.png';
      a.href = canvas.toDataURL('image/png');
      a.click();

      btn.textContent = '⬇ Download';
      btn.disabled = false;
    }

    document.getElementById('studentName').addEventListener('input', renderPreview);
    document.getElementById('studentDept').addEventListener('input', renderPreview);
    document.getElementById('courseDays').addEventListener('change', clearConflictError);
    document.getElementById('courseSlot').addEventListener('change', clearConflictError);
    document.getElementById('courseName').addEventListener('input', clearConflictError);

    renderPreview();
    // Delay to ensure fonts/layout settled before first scale
    requestAnimationFrame(scalePoster);
  </script>
</body>
</html>
